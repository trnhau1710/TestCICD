<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Chon vai tro - TicketHub</title>

	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
		crossorigin="anonymous"
	/>
	<link
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="{{ url_for('login.static', filename='css/Google_choose_role.css') }}" />
</head>
<body>
	<div class="google-role-page">
		<div class="google-role-background" aria-hidden="true">
			<div class="bg-shapes">
				<div class="shape shape-1"></div>
				<div class="shape shape-2"></div>
				<div class="shape shape-3"></div>
				<div class="shape shape-4"></div>
			</div>
		</div>

		{% with messages = get_flashed_messages(with_categories=true) %}
			{% if messages %}
				<div class="flash-messages" aria-live="polite">
					{% for category, message in messages %}
						<div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }}" role="alert">
							{{ message }}
						</div>
					{% endfor %}
				</div>
			{% endif %}
		{% endwith %}

		<div class="google-role-content">
			<div class="google-role-wrapper" aria-labelledby="googleRoleTitle">
				<header class="google-role-header">
					<div class="google-role-icon">
						<i class="fa-brands fa-google" aria-hidden="true"></i>
					</div>
					<h1 id="googleRoleTitle">Chọn vai trò sử dụng</h1>
					<p class="google-role-subtitle">
						Bước cuối cùng: chọn vai trò để kích hoạt đầy đủ tính năng phù hợp.
					</p>
				</header>

				<form class="google-role-form" action="{{ url_for('login.google_choose_role') }}" method="post">
					<label class="google-role-option" for="roleCustomer">
						<input
							id="roleCustomer"
							type="radio"
							name="role"
							value="customer"
							{% if selected_role == 'customer' or not selected_role %}checked{% endif %}
						/>
						<span class="google-role-option__body">
							<span class="google-role-option__icon" aria-hidden="true">
								<i class="fa-solid fa-user"></i>
							</span>
							<span class="google-role-option__content">
								<strong>Khách hàng</strong>
								<small>Mua vé, đặt chỗ và quản lý lịch sử đặt vé của bạn.</small>
							</span>
						</span>
					</label>

					<label class="google-role-option" for="roleOrganizer">
						<input
							id="roleOrganizer"
							type="radio"
							name="role"
							value="organizer"
							{% if selected_role == 'organizer' %}checked{% endif %}
						/>
						<span class="google-role-option__body">
							<span class="google-role-option__icon" aria-hidden="true">
								<i class="fa-solid fa-bullhorn"></i>
							</span>
							<span class="google-role-option__content">
								<strong>Người tổ chức</strong>
								<small>Đăng sự kiện và bán vé. Tài khoản của bạn sẽ có trạng thái PENDING cho đến khi được duyệt.</small>
							</span>
						</span>
					</label>

					<button type="submit" class="google-role-submit">
						<span class="btn-text">Tiếp tục</span>
						<span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
					</button>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
