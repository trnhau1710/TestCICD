{% extends 'base.html' %}

{% block content %}
<style>
    .account-settings-page {
        background: var(--light-bg);
        padding: 28px 0 46px;
    }

    .account-card {
        background: #fff;
        border: 1px solid var(--border-color);
        border-radius: 16px;
        box-shadow: 0 10px 28px rgba(17, 24, 39, 0.06);
        padding: 22px 22px 18px;
    }

    .account-card__title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        color: var(--text-dark);
    }

    .account-card__divider {
        margin: 12px 0 18px;
        border-top: 1px solid var(--border-color);
        opacity: 1;
    }

    .avatar-row {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 14px;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 16px;
    }

    .avatar-preview {
        width: 84px;
        height: 84px;
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: #fff;
        object-fit: cover;
    }

    .avatar-meta h6 {
        margin: 0;
        font-weight: 700;
        font-size: 15px;
        color: var(--text-dark);
    }

    .avatar-meta p {
        margin: 4px 0 10px;
        color: #6b7280;
        font-size: 13px;
    }

    .avatar-upload {
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .account-form .form-label {
        font-weight: 600;
        color: #334155;
    }

    .readonly-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 10px 0 6px;
    }

    .readonly-row__label {
        color: #475569;
        font-weight: 700;
    }

    .readonly-row__value {
        color: #6b7280;
        font-weight: 300;
    }

    .account-actions {
        display: flex;
        justify-content: center;
        padding-top: 14px;
    }

    .btn-outline-primary {
        border-color: var(--border-color);
        color: var(--primary-color);
        font-weight: 600;
    }

    .btn-outline-primary:hover {
        border-color: var(--primary-hover);
        background: rgba(28, 124, 226, 0.06);
        color: var(--primary-hover);
    }

    .password-card {
        margin-top: 18px;
        padding: 0;
    }

    .password-toggle {
        width: 100%;
        background: #fff;
        border: none;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 18px;
        font-weight: 700;
        color: var(--text-dark);
    }

    .password-toggle .toggle-icon {
        transition: transform 0.18s ease;
        color: #6b7280;
    }

    .password-toggle[aria-expanded='true'] .toggle-icon {
        transform: rotate(180deg);
    }

    .password-collapse {
        border-top: 1px solid var(--border-color);
        padding: 18px 20px 20px;
    }

    @media (max-width: 575.98px) {
        .avatar-row {
            grid-template-columns: 76px 1fr;
        }

        .avatar-preview {
            width: 68px;
            height: 68px;
        }

        .account-card {
            padding: 18px 16px 16px;
        }

        .password-toggle {
            padding: 16px;
            font-size: 16px;
        }

        .password-collapse {
            padding: 16px;
        }
    }
</style>

<div class="account-settings-page">
    <div class="container" style="max-width: 860px;">
        <section class="account-card" aria-label="Cài đặt tài khoản">
            <h1 class="account-card__title">Cài đặt tài khoản</h1>
            <hr class="account-card__divider" />

            <div class="avatar-row">
                <img class="avatar-preview"
                    src="{{ (current_user.avatar if current_user else None) or 'https://via.placeholder.com/84' }}"
                    alt="Ảnh đại diện" />

                <div class="avatar-meta">
                    <h6>Ảnh đại diện</h6>
                    <p>Upload ảnh đại diện của bạn tại đây</p>

                    <div class="avatar-upload">
                        <input class="d-none" id="avatarInput" type="file" accept="image/*" />
                        <label class="btn btn-outline-primary btn-sm" for="avatarInput">Upload</label>
                    </div>
                </div>
            </div>

            <div class="readonly-row">
                <div class="readonly-row__label">Tên tài khoản:</div>
                <div class="readonly-row__value">{{ current_user.username if current_user else '' }}</div>
            </div>

            <form class="account-form" autocomplete="off">
                <div class="mb-3">
                    <label class="form-label" for="displayName">Họ &amp; tên</label>
                    <input id="displayName" class="form-control" type="text" placeholder="Nhập họ & tên"
                        value="{{ current_user.name if current_user else '' }}" />
                </div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" class="form-control" type="email" placeholder="Nhập email"
                            value="{{ current_user.email if current_user else '' }}" />
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="phone">Số điện thoại</label>
                        <input id="phone" class="form-control" type="tel" placeholder="Nhập số điện thoại"
                            value="{{ current_user.phone if current_user else '' }}" />
                    </div>
                </div>

                <div class="account-actions">
                    <button type="button" class="btn btn-outline-primary px-4">Cập nhật</button>
                </div>
            </form>
        </section>

        <section class="account-card password-card" aria-label="Thay đổi mật khẩu">
            <button class="password-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#passwordCollapse"
                aria-expanded="false" aria-controls="passwordCollapse">
                <span>Thay đổi mật khẩu</span>
                <i class="fa-solid fa-chevron-down toggle-icon" aria-hidden="true"></i>
            </button>

            <div class="collapse" id="passwordCollapse">
                <div class="password-collapse">
                    <form autocomplete="off">
                        <div class="mb-3">
                            <label class="form-label" for="currentPassword">Nhập mật khẩu hiện tại</label>
                            <input id="currentPassword" class="form-control" type="password" placeholder="" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="newPassword">Nhập mật khẩu</label>
                            <input id="newPassword" class="form-control" type="password" placeholder="" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="confirmPassword">Nhập lại mật khẩu</label>
                            <input id="confirmPassword" class="form-control" type="password" placeholder="" />
                        </div>

                        <div class="account-actions">
                            <button type="button" class="btn btn-outline-primary px-4">Thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}
