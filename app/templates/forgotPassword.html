<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quên mật khẩu</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="{{ url_for('login.static', filename='css/forgotPassword.css') }}">
</head>
<body>
	<main class="forgot-page">
		<div class="forgot-background" aria-hidden="true">
			<span class="shape shape-a"></span>
			<span class="shape shape-b"></span>
			<span class="shape shape-c"></span>
		</div>

		<section class="forgot-card" aria-labelledby="forgotTitle">
			<header class="forgot-header">
				<h1 id="forgotTitle">Quên mật khẩu</h1>
				<p>Vui lòng xác minh mã từ email trước khi đặt mật khẩu mới.</p>
			</header>

			<div class="steps">
				<div class="step is-active" id="stepDot1">1. Xác nhận mã</div>
				<div class="step" id="stepDot2">2. Đặt mật khẩu</div>
			</div>

			<form
				id="verifyForm"
				class="panel panel-active"
				data-request-code-url="{{ url_for('login.request_forgot_password_code') }}"
				data-verify-code-url="{{ url_for('login.verify_forgot_password') }}"
				novalidate
			>
				<h2>Nhập mã xác nhận</h2>
				<div id="verifyNotice" class="verify-notice" role="alert" aria-live="assertive" hidden></div>

				<div class="form-group">
					<label for="verifyEmail">Email nhận mã</label>
					<div class="input-shell">
						<input type="email" id="verifyEmail" placeholder="name@example.com" required>
						<i class="status-icon fas"></i>
					</div>
					<div class="request-code-row">
						<button type="button" id="requestCodeBtn" class="btn-request-code">
							<i class="fas fa-paper-plane" aria-hidden="true"></i>
							<span>Nhận mã</span>
						</button>
					</div>
				</div>

				<div class="form-group">
					<label for="verifyCode">Mã xác nhận (6 chữ số)</label>
					<div class="input-shell">
						<input type="text" id="verifyCode" maxlength="6" inputmode="numeric" placeholder="VD: 123456" required>
						<i class="status-icon fas"></i>
					</div>
					<small class="hint" id="verifyHint"></small>
				</div>

				<div class="action-row">
					<a href="{{ url_for('login.login') }}" class="btn-outline">
						<i class="fas fa-arrow-left" aria-hidden="true"></i>
						<span>Về đăng nhập</span>
					</a>
					<button type="submit" class="btn-primary">
						<span>Xác nhận mã</span>
						<i class="fas fa-arrow-right" aria-hidden="true"></i>
					</button>
				</div>
			</form>

			<form id="resetForm" class="panel" data-reset-password-url="{{ url_for('login.reset_forgot_password') }}" novalidate>
				<h2>Tạo mật khẩu mới</h2>

				<div class="form-group">
					<label for="newPassword">Mật khẩu mới</label>
					<div class="input-shell">
						<input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" required>
						<button type="button" class="toggle-password" aria-label="Hiện mật khẩu">
							<i class="fas fa-eye"></i>
						</button>
						<i class="status-icon fas"></i>
					</div>
					<small class="hint" id="newPasswordHint" aria-live="polite"></small>
				</div>

				<div class="form-group">
					<label for="confirmPassword">Nhập lại mật khẩu mới</label>
					<div class="input-shell">
						<input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
						<button type="button" class="toggle-password" aria-label="Hiện mật khẩu">
							<i class="fas fa-eye"></i>
						</button>
						<i class="status-icon fas"></i>
					</div>
					<small class="hint" id="resetHint"></small>
				</div>

				<div class="action-row">
					<button type="button" id="backToCode" class="btn-outline">
						<i class="fas fa-arrow-left" aria-hidden="true"></i>
						<span>Quay lại bước mã</span>
					</button>
					<button type="submit" class="btn-primary">
						<span>Cập nhật mật khẩu</span>
						<i class="fas fa-check" aria-hidden="true"></i>
					</button>
				</div>
			</form>
		</section>
	</main>

	<script src="{{ url_for('login.static', filename='js/forgotPassword.js') }}"></script>
</body>
</html>
