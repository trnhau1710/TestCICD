<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('login.static', filename='css/login.css') }}">
</head>
<body>
	<div class="login-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }}" role="alert">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    <!-- Background Shapes -->
    <div class="login-background">
        <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <!-- Login Content -->
    <div class="login-content">
        <div class="login-wrapper">
            <!-- Login Header -->
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1 class="login-title">Chào mừng trở lại</h1>
            </div>

            <!-- Login Form -->
            <div class="login-form">
                <form method="POST" class="modern-form">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" required class="form-input" placeholder=" ">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required class="form-input" placeholder=" ">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span class="btn-text">Đăng nhập</span>
                        <div class="btn-icon">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </button>
                </form>

                <div class="login-support" aria-label="Tùy chọn bổ sung">
                    <p class="support-row">
                        <span>Chưa có tài khoản?</span>
                        <a href="{{ url_for('login.signup') }}" class="support-link">Đăng ký</a>
                    </p>
                    <a href="{{ url_for('login.forgot_password') }}" class="support-link forgot-link">Quên mật khẩu</a>

                    <div class="support-divider" aria-hidden="true"></div>

                    <a href="{{ url_for('login.login_google') }}" class="google-login-btn">
                        <i class="fab fa-google" aria-hidden="true"></i>
                        <span>Đăng nhập bằng tài khoản Google</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('login.static', filename='js/login.js') }}"></script>
</body>
</html>
